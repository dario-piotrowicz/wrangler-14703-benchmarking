name: Wrangler Dependency Collection Caching Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # Matrix benchmark job
  # --------------------------------------------------------------------------
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pkg-manager: [npm, pnpm]
        dep-tier: [few, medium, lots]

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / ${{ matrix.pkg-manager }} / ${{ matrix.dep-tier }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: matrix.pkg-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # -----------------------------------------------------------------------
      # Install the dependency tier into worker/
      # -----------------------------------------------------------------------
      - name: Install dependency tier (${{ matrix.dep-tier }})
        shell: bash
        working-directory: worker
        run: |
          # Read the dep list for this tier from scripts/deps.json
          DEPS=$(node -e "
            const fs = require('fs');
            const deps = JSON.parse(fs.readFileSync('../scripts/deps.json', 'utf-8'));
            console.log(deps['${{ matrix.dep-tier }}'].join(' '));
          ")

          echo "Installing ${{ matrix.dep-tier }} tier dependencies..."
          echo "Dep count: $(echo $DEPS | wc -w | tr -d ' ')"

          if [ "${{ matrix.pkg-manager }}" = "npm" ]; then
            npm install --save --legacy-peer-deps $DEPS
          else
            pnpm add $DEPS
          fi

      - name: Show dependency counts
        shell: bash
        working-directory: worker
        run: |
          echo "=== package.json dependencies ==="
          node -e "
            const pkg = require('./package.json');
            const deps = Object.keys(pkg.dependencies || {}).length;
            console.log('Direct dependencies:', deps);
          "

          if [ "${{ matrix.pkg-manager }}" = "npm" ]; then
            echo "=== Lockfile: package-lock.json ==="
            node -e "
              const lock = require('./package-lock.json');
              const count = Object.keys(lock.packages || {}).filter(k => k !== '').length;
              console.log('Total resolved packages:', count);
            "
          else
            echo "=== Lockfile: pnpm-lock.yaml ==="
            echo "(pnpm lockfile present)"
            ls -la pnpm-lock.yaml 2>/dev/null || echo "No pnpm-lock.yaml found"
          fi

      # -----------------------------------------------------------------------
      # Run the benchmark
      # -----------------------------------------------------------------------
      - name: Run benchmark
        id: bench
        shell: bash
        working-directory: worker
        run: |
          # Run benchmark, capture JSON from stdout, logs go to stderr
          RESULT=$(node ../scripts/benchmark.mjs --cwd . --trials 5 --warm-runs 3)

          # Save full JSON result to a file
          echo "$RESULT" > ../benchmark-result.json

          # Extract key metrics for step output
          node -e "
            const r = JSON.parse(process.argv[1]);
            const lines = [
              'baseline_cold_median=' + r.stats.baseline.cold.median.toFixed(1),
              'baseline_warm_median=' + r.stats.baseline.warm.median.toFixed(1),
              'branch_cold_median=' + r.stats.branch.cold.median.toFixed(1),
              'branch_warm_median=' + r.stats.branch.warm.median.toFixed(1),
              'warm_speedup=' + r.speedup.warm,
              'cold_speedup=' + r.speedup.cold,
              'branch_cache_speedup=' + r.speedup.branch_cache,
              'delta_median=' + r.paired_delta.median.toFixed(1),
            ];
            lines.forEach(l => console.log(l));
          " "$RESULT" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Upload result artifact
      # -----------------------------------------------------------------------
      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.os }}-${{ matrix.pkg-manager }}-${{ matrix.dep-tier }}
          path: benchmark-result.json
          retention-days: 30

      # -----------------------------------------------------------------------
      # Per-job summary
      # -----------------------------------------------------------------------
      - name: Job summary
        shell: bash
        run: |
          {
            echo "## Benchmark: ${{ matrix.os }} / ${{ matrix.pkg-manager }} / ${{ matrix.dep-tier }}"
            echo ""
            echo "| Metric | baseline (main) | branch (#14819) |"
            echo "|--------|-----------------|-----------------|"
            echo "| Cold (1st deploy) | ${{ steps.bench.outputs.baseline_cold_median }} ms | ${{ steps.bench.outputs.branch_cold_median }} ms |"
            echo "| Warm (2nd+ deploy) | ${{ steps.bench.outputs.baseline_warm_median }} ms | ${{ steps.bench.outputs.branch_warm_median }} ms |"
            echo ""
            echo "**Warm speedup:** ${{ steps.bench.outputs.warm_speedup }}x"
            echo "**Cold speedup:** ${{ steps.bench.outputs.cold_speedup }}x"
            echo "**Branch cache benefit (cold vs warm):** ${{ steps.bench.outputs.branch_cache_speedup }}x"
            echo "**Paired warm delta median:** ${{ steps.bench.outputs.delta_median }} ms"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # Summary job: collect all results into one table
  # --------------------------------------------------------------------------
  summary:
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()
    name: Summary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: result-*

      - name: Generate summary report
        shell: bash
        run: |
          node << 'SCRIPT'
          const fs = require("fs");
          const path = require("path");

          const resultsDir = "results";
          const rows = [];

          // Walk the downloaded artifacts
          for (const dir of fs.readdirSync(resultsDir)) {
            const filePath = path.join(resultsDir, dir, "benchmark-result.json");
            if (!fs.existsSync(filePath)) continue;

            // Parse the artifact directory name: result-<os>-<pkg-manager>-<dep-tier>
            const parts = dir.replace("result-", "").split("-");
            // Handle os names like "ubuntu-latest", "macos-latest", "windows-latest"
            // The format is: result-ubuntu-latest-npm-few
            let os, pkgManager, depTier;
            if (parts[0] === "ubuntu" || parts[0] === "macos" || parts[0] === "windows") {
              os = parts[0] + "-" + parts[1];
              pkgManager = parts[2];
              depTier = parts[3];
            } else {
              // Fallback
              os = dir;
              pkgManager = "?";
              depTier = "?";
            }

            try {
              const data = JSON.parse(fs.readFileSync(filePath, "utf-8"));
              rows.push({
                os,
                pkgManager,
                depTier,
                baselineColdMedian: data.stats.baseline.cold.median.toFixed(1),
                baselineWarmMedian: data.stats.baseline.warm.median.toFixed(1),
                branchColdMedian: data.stats.branch.cold.median.toFixed(1),
                branchWarmMedian: data.stats.branch.warm.median.toFixed(1),
                baselineWarmStddev: data.stats.baseline.warm.stddev.toFixed(1),
                branchWarmStddev: data.stats.branch.warm.stddev.toFixed(1),
                warmSpeedup: data.speedup.warm,
                coldSpeedup: data.speedup.cold,
                branchCacheSpeedup: data.speedup.branch_cache,
                deltaMedian: data.paired_delta.median.toFixed(1),
                node: data.environment.node,
                cpu: data.environment.cpu,
                ramGb: data.environment.ram_gb,
              });
            } catch (err) {
              console.error("Failed to parse", filePath, err.message);
            }
          }

          // Sort: by OS, then pkg manager, then dep tier order
          const tierOrder = { few: 0, medium: 1, lots: 2 };
          rows.sort((a, b) => {
            if (a.os !== b.os) return a.os.localeCompare(b.os);
            if (a.pkgManager !== b.pkgManager) return a.pkgManager.localeCompare(b.pkgManager);
            return (tierOrder[a.depTier] ?? 99) - (tierOrder[b.depTier] ?? 99);
          });

          // Build markdown
          let md = `# Wrangler Dependency Collection Caching Benchmark Results\n\n`;
          md += `Comparing \`wrangler@main\` (baseline) vs \`wrangler@14819\` (branch) across OS, package manager, and dependency count.\n\n`;
          md += `### Warm Runs (cached, 2nd+ deploy)\n\n`;
          md += `This is the key comparison — warm runs show the cache benefit.\n\n`;
          md += `| OS | Pkg Manager | Deps | Baseline Warm | Branch Warm | Warm Speedup | Cache Benefit | Delta |\n`;
          md += `|----|-------------|------|---------------|-------------|--------------|---------------|-------|\n`;

          for (const r of rows) {
            const warmStr = r.warmSpeedup > 1.01
              ? `**${r.warmSpeedup}x faster**`
              : r.warmSpeedup < 0.99
                ? `${(1 / r.warmSpeedup).toFixed(3)}x slower`
                : `~same (${r.warmSpeedup}x)`;
            const cacheStr = r.branchCacheSpeedup > 1.01
              ? `${r.branchCacheSpeedup}x`
              : `~none (${r.branchCacheSpeedup}x)`;
            md += `| ${r.os} | ${r.pkgManager} | ${r.depTier} | ${r.baselineWarmMedian} ms (±${r.baselineWarmStddev}) | ${r.branchWarmMedian} ms (±${r.branchWarmStddev}) | ${warmStr} | ${cacheStr} | ${r.deltaMedian} ms |\n`;
          }

          md += `\n### Cold Runs (1st deploy, no cache)\n\n`;
          md += `| OS | Pkg Manager | Deps | Baseline Cold | Branch Cold | Cold Speedup |\n`;
          md += `|----|-------------|------|---------------|-------------|-------------|\n`;

          for (const r of rows) {
            const coldStr = r.coldSpeedup > 1.01
              ? `${r.coldSpeedup}x faster`
              : r.coldSpeedup < 0.99
                ? `${(1 / r.coldSpeedup).toFixed(3)}x slower`
                : `~same (${r.coldSpeedup}x)`;
            md += `| ${r.os} | ${r.pkgManager} | ${r.depTier} | ${r.baselineColdMedian} ms | ${r.branchColdMedian} ms | ${coldStr} |\n`;
          }

          md += `\n### Environment Details\n\n`;

          if (rows.length > 0) {
            md += `| OS | CPU | RAM | Node |\n`;
            md += `|----|-----|-----|------|\n`;
            const seen = new Set();
            for (const r of rows) {
              const key = r.os;
              if (seen.has(key)) continue;
              seen.add(key);
              md += `| ${r.os} | ${r.cpu} | ${r.ramGb} GB | ${r.node} |\n`;
            }
          }

          md += `\n### Interpretation\n\n`;
          md += `- **Warm Speedup > 1**: branch (#14819) warm runs are faster than baseline (main) warm runs\n`;
          md += `- **Cache Benefit**: how much faster the branch's warm runs are vs its own cold run (measures the caching effect)\n`;
          md += `- **Delta**: median of per-trial paired warm differences (branch - baseline). Negative = branch is faster.\n`;
          md += `- Each cell ran 5 trials. Each trial = 1 cold run + 3 warm runs per variant.\n`;

          // Write to GITHUB_STEP_SUMMARY
          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          if (summaryFile) {
            fs.appendFileSync(summaryFile, md);
          }

          // Also print to stdout
          console.log(md);

          // Save as artifact
          fs.writeFileSync("summary-report.md", md);
          SCRIPT

      - name: Upload summary report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: summary-report.md
          retention-days: 30
